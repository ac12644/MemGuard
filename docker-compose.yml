services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: memguard
      POSTGRES_PASSWORD: memguard
      POSTGRES_DB: memguard
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      MEMGUARD_ENV: development
      MEMGUARD_SECRET_KEY: docker-dev-secret-change-in-prod
      DATABASE_URL: postgresql+asyncpg://memguard:memguard@postgres:5432/memguard
      REDIS_URL: redis://redis:6379/0
      MEMGUARD_CORS_ORIGINS: "*"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    entrypoint: []
    command: ["celery", "-A", "src.scheduler.tasks", "worker", "--loglevel=info", "-c", "2"]
    environment:
      MEMGUARD_ENV: development
      MEMGUARD_SECRET_KEY: docker-dev-secret-change-in-prod
      DATABASE_URL: postgresql+asyncpg://memguard:memguard@postgres:5432/memguard
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    entrypoint: []
    command: ["celery", "-A", "src.scheduler.tasks", "beat", "--loglevel=info"]
    environment:
      MEMGUARD_ENV: development
      MEMGUARD_SECRET_KEY: docker-dev-secret-change-in-prod
      DATABASE_URL: postgresql+asyncpg://memguard:memguard@postgres:5432/memguard
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
