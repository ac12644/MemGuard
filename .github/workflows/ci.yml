name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memguard
          POSTGRES_PASSWORD: memguard
          POSTGRES_DB: memguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memguard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]" psycopg2-binary

      - name: Lint
        run: ruff check src/ tests/

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://memguard:memguard@localhost:5432/memguard
          REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head

      - name: Unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://memguard:memguard@localhost:5432/memguard
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/unit/ -v

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Build
        working-directory: dashboard
        run: npx vite build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t memguard-api .

      - name: Build Dashboard image
        run: docker build -t memguard-dashboard ./dashboard
